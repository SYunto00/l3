<style>
:root{
  --wine:#6a2a2e; --wine-hi:#833537; --wine-dim:#4e1e22; --wine-night:#371316;
  --kinari:#f1ece4; --kinari-mid:#e8e2d8; --kinari-dim:#d0c8b8;
  --gold:#b08840; --shu:#b04a3a; --shu-hi:#d97a5e; --ember:#d99a7e;
  --font-min:"Shippori Mincho","Hiragino Mincho ProN",serif;
  --font-got:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
  --font-hand:"Yusei Magic","Hiragino Maru Gothic ProN",cursive;
  --font-en:"Cormorant Garamond",Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:auto}
body{background:var(--wine);color:var(--kinari);font-family:var(--font-min);overflow-x:hidden}
#track{height:840vh;position:relative}
#stage{position:sticky;top:0;height:100vh;overflow:hidden}

/* ===== 背景: 2層固定グラデのopacityクロスフェード + 夜 ===== */
.bg{position:absolute;inset:0;pointer-events:none}
#bg-cool{background:linear-gradient(160deg,#5a2226 0%,var(--wine-dim) 60%,#421a1e 100%)}
#bg-warm{background:linear-gradient(160deg,var(--wine-hi) 0%,var(--wine) 55%,#5c2428 100%)}
#bg-night{background:radial-gradient(ellipse 120% 90% at 50% 70%,#2e1013 0%,#1f0a0c 60%,#150507 100%)}
#fog{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(100deg,transparent 20%,rgba(241,236,228,.085) 45%,rgba(241,236,228,.13) 50%,rgba(241,236,228,.085) 55%,transparent 80%);
  opacity:0;width:160%;left:-30%}

/* ===== 語 ===== */
#words{position:absolute;inset:0}
.w{position:absolute;left:0;top:0;white-space:nowrap;will-change:transform,opacity;
  line-height:1.25;letter-spacing:.06em;cursor:default;visibility:hidden}
.w.on{visibility:visible}
.w-thought{font-family:var(--font-min);color:var(--kinari)}
.w-hobby{font-family:var(--font-min);font-weight:400;color:var(--kinari-mid)}
.w-emotion{font-family:var(--font-hand);color:var(--ember)}
.w-ops{font-family:var(--font-got);font-weight:300;color:var(--kinari-dim);letter-spacing:.12em}
.w-ritual{font-family:var(--font-hand);color:var(--shu-hi)} /* 昇格: 事務語が肉声になる */
.w.frozen,.w.pre{color:transparent !important;-webkit-text-stroke:1px rgba(241,236,228,.34)}
.w.pre{-webkit-text-stroke:1px rgba(241,236,228,.16)}
.w .quote-birth{position:absolute;left:0;top:-1.6em;font-family:var(--font-got);font-weight:300;
  font-size:12px;letter-spacing:.08em;color:var(--kinari-dim);white-space:nowrap;pointer-events:none}
/* 朱下線: 全ページ唯一 */
.w .shu-line{position:absolute;left:-2%;bottom:-.12em;height:2px;width:104%;background:var(--shu-hi);
  transform-origin:left center;transform:scaleX(0)}

/* ===== 縦糸: 30代の問い ===== */
#annos{position:absolute;inset:0;z-index:20;pointer-events:none}
#thread{position:absolute;top:3.2vh;left:50%;transform:translateX(-50%);text-align:center;
  font-family:var(--font-min);font-weight:500;font-size:clamp(13px,1.5vw,17px);
  letter-spacing:.18em;color:rgba(241,236,228,.5);white-space:nowrap;pointer-events:none;opacity:0}
/* ===== 注記（朱手書き）と温度 ===== */
.anno{position:absolute;font-family:var(--font-hand);color:var(--shu-hi);
  font-size:clamp(13px,1.7vw,18px);letter-spacing:.1em;line-height:1.9;
  pointer-events:none;opacity:0;white-space:pre-line}
/* ===== 欄外の思想注（右上）: 引用/出典/中心/温度 ===== */
#margin{position:absolute;top:11vh;right:4vw;max-width:30vw;text-align:right;
  pointer-events:none;z-index:21}
#margin .mq{font-family:var(--font-min);font-weight:400;font-size:clamp(12px,1.4vw,15px);
  line-height:2.1;letter-spacing:.1em;color:rgba(241,236,228,.78)}
#margin .ms{margin-top:.5em;font-family:var(--font-got);font-weight:300;font-size:11px;
  letter-spacing:.22em;color:var(--kinari-dim)}
#margin .mc{margin-top:1.1em;font-family:var(--font-hand);font-size:clamp(12px,1.4vw,14px);
  letter-spacing:.12em;line-height:1.9;color:var(--shu-hi)}
#margin .mt{margin-top:1.2em;font-family:var(--font-hand);font-size:12px;
  letter-spacing:.14em;color:var(--shu-hi);opacity:0}
#margin .mt .tw{display:block;font-family:var(--font-en);font-style:italic;font-size:.82em;
  color:rgba(241,236,228,.5);letter-spacing:.2em;margin-top:.3em}

/* ===== 月ラベル ===== */
#month{position:absolute;bottom:9vh;left:5vw;font-family:var(--font-en);font-style:italic;
  font-size:clamp(40px,7vw,84px);color:rgba(241,236,228,.13);letter-spacing:.06em;pointer-events:none}
#month b{font-family:var(--font-min);font-weight:500;font-size:.42em;letter-spacing:.3em;
  color:rgba(241,236,228,.3);vertical-align:.5em;margin-left:.4em}

/* ===== プロローグ ===== */
#prologue{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;pointer-events:none}
#prologue h1{font-family:var(--font-min);font-weight:600;font-size:clamp(44px,8vw,96px);
  letter-spacing:.3em;text-indent:.3em;color:var(--kinari)}
#prologue .sub{margin-top:2.2vh;font-family:var(--font-min);font-weight:400;
  font-size:clamp(13px,1.8vw,17px);letter-spacing:.22em;color:var(--kinari-dim)}
#prologue .legend{margin-top:6vh;font-family:var(--font-hand);color:var(--shu-hi);
  font-size:clamp(12px,1.5vw,15px);letter-spacing:.12em;line-height:2.4}
#prologue .hint{margin-top:5vh;font-family:var(--font-got);font-weight:300;

}
const valAt = (w, t) => { const k = Math.floor(t); return lerp(w.vals[k] || 0, w.vals[k + 1] || 0, t - k); };
const stateAt = (w, t) => { let s = 'absent'; for (const x of w.st) if (t >= x.t) s = x.s; return s; };
const layerAt = (w, t) => { let l = w.layer; for (const m of w.mig) if (t >= m.t) l = m.layer; return l; };

/* ---- 帯（レイヤー→y域%）。帯内yは黄金比で均等散布（衝突回避・決定的） ---- */
const BAND = { hobby: [10, 18], thought: [22, 50], emotion: [53, 71], ops: [83, 93], ritual: [72, 78] };
const bandY = {};
for (const l of Object.keys(BAND)) {
  const members = WORDS.filter(w => w.layer === l || w.mig.some(m => m.layer === l));
  const [a, b] = BAND[l];
  members.forEach((w, k) => { (bandY[w.i] = bandY[w.i] || {})[l] = a + ((k * 0.618034) % 1) * (b - a); });
}
const yOf = (w, l) => (bandY[w.i] && bandY[w.i][l] != null) ? bandY[w.i][l] : BAND[l][0];

/* ---- 温度 → warmth / windSpeed（週次線形補間） ---- */
const tempMap = {}; TEMPS.forEach(x => tempMap[wNum(x.week)] = x);
function tempAt(t) {
  const k = clamp(Math.floor(t), 14, 24), f = clamp(t - k, 0, 1);
  const a = tempMap[clamp(k, 14, 24)] || { warmth: .4, windSpeed: .5 };
  const b = tempMap[clamp(k + 1, 14, 24)] || a;
  return { warmth: lerp(a.warmth, b.warmth, f), wind: lerp(a.windSpeed, b.windSpeed, f) };
}

/* ---- 月境界の風送り（風が止まり、向きが変わる） ---- */
const MONTHS = [[10, 'Mar', '三月'], [14.15, 'Apr', '四月'], [18.55, 'May', '五月'], [23.0, 'Jun', '六月']];
function windDir(t) { // 月ごとに反転、境界±0.18週で凪
  let idx = 0; for (let i = 0; i < MONTHS.length; i++) if (t >= MONTHS[i][0]) idx = i;
  let amp = 1;
  for (const [mt] of MONTHS) { const d = Math.abs(t - mt); if (d < .18) amp = Math.min(amp, smooth(d / .18)); }
  return { dir: idx % 2 ? -1 : 1, lull: amp };
}

/* ---- DOM生成 ---- */
const stage = document.getElementById('words');
const frag = document.createDocumentFragment();
WORDS.forEach(w => {
  const el = document.createElement('div');
  el.className = 'w w-' + w.layer;
  el.textContent = w.text;
  if (w.quote && w.selfMade >= 0.85 && w.born) { // 鋳造演出: 生引用→blur→核語
    const q = document.createElement('span'); q.className = 'quote-birth';
    q.textContent = '「' + w.quote.slice(0, 42) + (w.quote.length > 42 ? '…' : '') + '」';
    el.appendChild(q); w.qEl = q;
  }
  if (w.text === '現場の善意を、AIで解放する') { // 朱下線: 全ページ唯一
    const u = document.createElement('span'); u.className = 'shu-line'; el.appendChild(u); w.uEl = u;
  }
  w.el = el;
  el.addEventListener('mouseenter', () => showCard(w));
  el.addEventListener('mouseleave', hideCard);
  frag.appendChild(el);
});
stage.appendChild(frag);

/* ---- 注記（朱手書き・1シーン1個の予算制） ---- */
const ANNO = [/*ANNO_START*/
  { t0: 9.7, t1: 13.6, x: 50, y: 44, c: 1, text: '三月——記録は、残っていない' },
  { t0: 16.6, t1: 18.4, x: 22, y: 26, text: '三十歳。質量の季節' },
  { t0: 18.9, t1: 19.9, x: 64, y: 78, text: 'ここから、定量観測' },
  { t0: 21.0, t1: 22.0, x: 50, y: 14, c: 1, text: '鋳造の夜 5/23–24' },
  { t0: 22.3, t1: 23.3, x: 56, y: 12, text: '滑る趣味は、事業の風景に転生した' },
  { t0: 24.35, t1: 25.3, x: 50, y: 58, c: 1, text: 'まだ、変わりつづけている' },
  { t0: 24.75, t1: 25.3, x: 50, y: 66, c: 1, small: 1, text: '観測は、観測されるものを変える——この風景も、もう語彙のひとつ' },
/*ANNO_END*/];
const annoBox = document.getElementById('annos');
ANNO.forEach(a => {
  const el = document.createElement('div'); el.className = 'anno';
  el.textContent = a.text;
  el.style.left = a.x + '%'; el.style.top = a.y + '%';
  if (a.c) el.style.transform = 'translateX(-50%)';
  if (a.small) el.style.fontSize = '12px';
  annoBox.appendChild(el); a.el = el;
});

/* ---- 縦糸: 30代の問い 3変奏 ---- */
const THREAD = [
  [17.2, '他者と共に質量を生み出すとは、どういうことか？'],
  [21.4, '——他者の中の質量を、解放する'],
  [24.1, '他者と共に質量を生み出すとは、どういうことか？'],
];
const threadEl = document.getElementById('thread');

/* ---- 月・温度・スクラバー ---- */
const monthEn = document.getElementById('month-en');
const monthJa = document.getElementById('month-ja');
const tempName = document.getElementById('temp-name');
const tempMeta = document.getElementById('temp-meta');
const mTemp = document.getElementById('m-temp');
const mQuote = document.getElementById('m-quote');
const mSrc = document.getElementById('m-src');
const mCenter = document.getElementById('m-center');
const MARG = DATA.marginalia || [];
let lastMarg = -1;
const bar = document.querySelector('#bar i');
const barBox = document.getElementById('bar');
MONTHS.forEach(([mt]) => { const s = document.createElement('s');
  // 月境界tをpへ逆引き（アンカー区分線形の逆）
  let p = 0; for (let i = 1; i < ANCHORS.length; i++) { const [p0, t0] = ANCHORS[i - 1], [p1, t1] = ANCHORS[i];
    if (mt >= t0 && mt <= t1) { p = p0 + (p1 - p0) * (mt - t0) / (t1 - t0); break; } }
  s.style.left = (p * 100) + '%'; barBox.appendChild(s); });

/* ---- hoverカード ---- */
const card = document.getElementById('card');
const cardQ = card.querySelector('.q'), cardM = card.querySelector('.meta');
function showCard(w) {
  cardQ.textContent = w.quote ? '「' + w.quote + '」' : w.text;
  const span = w.first <= 13 ? '観測以前〜' : 'W' + w.first + (w.last > w.first ? '〜W' + w.last : '');
  cardM.textContent = (w.quoteDate ? w.quoteDate + ' / ' : '') + span +
    (w.source === 'memory' ? ' / 記憶からの再構成' : '');
  card.style.opacity = 1;
}
function hideCard() { card.style.opacity = 0; }

/* ---- スクロール → 速度適応lerp（赤ヒーロー移植） ---- */
let pTarget = 0, pCur = 0, vel = 0;
const params = new URLSearchParams(location.search);
const pFix = params.has('p') ? +params.get('p') : null;
function targetProgress() {
  if (pFix !== null) return pFix;
  const h = document.getElementById('track').offsetHeight - innerHeight;
  return clamp(scrollY / h, 0, 1);
}
function adaptive(cur, target) {
  const diff = target - cur;
  const rate = Math.min(0.38, 0.085 + Math.abs(diff) * 1.0);
  return cur + diff * rate;
}

/* ---- メインループ ---- */
const fogEl = document.getElementById('fog');
const warmEl = document.getElementById('bg-warm');
const nightEl = document.getElementById('bg-night');
const proEl = document.getElementById('prologue');
const ffEl = document.getElementById('firefly');
let lastThread = '';

function frame(now) {
  const clock = pFix !== null ? 7.3 : now * 0.001;
  pTarget = targetProgress();
  pCur = pFix !== null ? pFix : adaptive(pCur, pTarget);
  vel = clamp((pTarget - pCur) * 18, -1, 1); // 逆走で逆風
  const p = pCur, t = tOf(p);
  const tp = tempAt(t), wd = windDir(t);
  const windBase = (reduceMotion ? 0 : 1) * tp.wind * wd.lull;

  /* 背景 */
  warmEl.style.opacity = tp.warmth;
  const night = smooth(clamp((0.95 - Math.abs(t - 21.6)) / 0.5, 0, 1));
  nightEl.style.opacity = night * .96;
  /* 月境界の霧 */
  let fog = 0;
  for (const [mt] of MONTHS) { const d = Math.abs(t - mt); if (d < .22) fog = Math.max(fog, 1 - d / .22); }
  if (t < 13.6) fog = Math.max(fog, .55); // 三月=霧の岸
  fogEl.style.opacity = fog;
  fogEl.style.transform = `translateX(${(clock * 1.2 % 10) * 3 - 15}%)`;

  /* プロローグ */
  proEl.style.opacity = clamp(1 - p / 0.055, 0, 1);

  /* 月ラベル */
  let mi = 0; for (let i = 0; i < MONTHS.length; i++) if (t >= MONTHS[i][0]) mi = i;
  if (p < .065) { monthEn.textContent = ''; monthJa.textContent = ''; }
  else { monthEn.textContent = MONTHS[mi][1]; monthJa.textContent = MONTHS[mi][2]; }

  /* 欄外の思想注: 哲学者の言葉 / 思想の中心（シーン単位） */
  let mgi = -1;
  for (let i = 0; i < MARG.length; i++) if (t >= MARG[i].t0 && t <= MARG[i].t1) { mgi = i; break; }
  if (mgi >= 0 && mgi !== lastMarg) {
    const m = MARG[mgi];
    mQuote.textContent = m.quote ? '「' + m.quote + '」' : '';
    mSrc.textContent = m.philosopher ? '—— ' + m.philosopher : '';
    mCenter.textContent = m.center || '';
    lastMarg = mgi;
  }
  const mv = mgi >= 0 ? smooth((t - MARG[mgi].t0) / .3) * smooth((MARG[mgi].t1 - t) / .3) : 0;
  mQuote.style.opacity = mv; mSrc.style.opacity = mv * .9; mCenter.style.opacity = mv;

  /* 温度名（週単位・思想注の4行目） */
  const wk = Math.round(t - .5);
  const tw = tempMap[wk];
  if (tw && p > .08) {
    tempName.textContent = tw.name;
    tempMeta.textContent = 'W' + wk + ' · warmth ' + tw.warmth.toFixed(2);
    mTemp.style.opacity = clamp(1 - Math.abs(t - .5 - wk) * 2.2, 0, .9);
  } else mTemp.style.opacity = 0;

  /* 縦糸 */
  let th = ''; for (const [tt, s] of THREAD) if (t >= tt) th = s;
  if (th !== lastThread) { threadEl.textContent = th; lastThread = th; }
  threadEl.style.opacity = th ? clamp((t - 17.2) * 2, 0, 1) * .9 : 0;

  /* 注記 */
  for (const a of ANNO) {
    const vis = t > a.t0 && t < a.t1 ? smooth((t - a.t0) / .25) * smooth((a.t1 - t) / .25) : 0;
    a.el.style.opacity = vis * .95;
  }

  /* ホタル（マロンモード: Δt≈0.1 のみ・ゆっくり戻ると見つかる） */
  const ff = smooth(1 - Math.abs(t - 21.62) / .1);
  ffEl.style.opacity = ff;
  if (ff > 0) ffEl.style.transform =
    `translate(${(42 + Math.sin(clock * .9) * 6) * innerWidth / 100}px, ${(30 + Math.cos(clock * .7) * 5) * innerHeight / 100}px)`;

  /* ===== 語 ===== */
  for (const w of WORDS) {
    const el = w.el;
    const v = valAt(w, t);
    const st = stateAt(w, t);
    const preEcho = t < w.first && t > w.first - 2.6 && w.first <= 16; // 霧の岸の輪郭
    const ghostWin = t > w.last + 2.4;
    const isFrozen = st === 'frozen';
    /* 可視判定（カリング: visibility切替のみ） */
    let alphaState;
    if (v > 0.04) alphaState = .85;
    else if (preEcho) alphaState = .3;
    else if (isFrozen) alphaState = .3;
    else if (st === 'dormant' && !ghostWin) alphaState = .34;
    else { if (el.classList.contains('on')) el.classList.remove('on'); continue; }
    if (!el.classList.contains('on')) el.classList.add('on');

    /* 層（移動語は帯クロス） */
    const l = layerAt(w, t);
    if (el._l !== l) { el.className = 'w on w-' + l; el._l = l; }
    el.classList.toggle('frozen', isFrozen);
    el.classList.toggle('pre', preEcho && v <= 0.04);

    /* 位置: 右から流入 → 帯内をゆっくり左へ → 死後は左上へ抜ける */
    const span = Math.max(1, w.last - w.first + 1);
    const lifeF = clamp((t - w.first + .6) / (span + 1.2), 0, 1);
    let x;
    if (preEcho) x = Math.min(90, 78 + (w.first - t) * 5);   // 霧の中、右奥
    else if (t < w.first) x = 104;
    else x = lerp(80, 18, lifeF) + (rnd(w.i, 7) - .5) * (l === 'ops' ? 46 : 30);
    if (isMobile && t >= w.first) { // SP右端クリップ回避: 語幅(字数×サイズ)ぶん引き込む
      const wpct = Math.min(60, w.text.length * sizeOf(w, t) / innerWidth * 100);
      x = Math.min(x, 94 - wpct);
    }
    let y = yOf(w, l);
    let fade = 1;
    if (t > w.last + .6 && !isFrozen && st !== 'active') { // 死後: 上空へ薄れる
      const d = clamp((t - w.last - .6) / 1.8, 0, 1);
      y -= d * 9; x -= d * 12; fade = 1 - d * .8;
    }
    if (isFrozen) { x = 8 + rnd(w.i, 9) * 7; } // 冷凍語: 左端の記念碑

    /* 風（事務語=無風 / 冷凍=風応答停止） */
    const noWind = l === 'ops' || isFrozen || preEcho;
    const amp = noWind ? 0 : windBase * (4 + w.emotion * 7);
    const ph = rnd(w.i, 1) * 6.283, f1 = .5 + rnd(w.i, 2) * .5;
    const gust = Math.sin(clock * .13 + ph) * .5 + .5;
    const wx = amp * (Math.sin(clock * f1 + ph) + .4 * Math.sin(clock * f1 * 2.7 + ph * 2)) * (1 + gust) * wd.dir
             + vel * (noWind ? 0 : -7);
    const wy = amp * .45 * Math.cos(clock * f1 * .8 + ph);
    const breathe = noWind ? 1 : 1 + Math.sin(clock * .8 + ph) * .08; // ±8% scale=肌理
    let size = sizeOf(w, t);
    if (l === 'ops') size = Math.min(size, STEPS[2]); // 事務語=通奏低音、声を張らない
    const rot = l === 'emotion' ? -1.5 - rnd(w.i, 4) * 1.5 : 0;
    const weight = 300 + Math.round(w.selfMade * 300);

    el.style.transform = `translate(${x * innerWidth / 100 + wx}px, ${y * innerHeight / 100 + wy}px)`
      + ` rotate(${rot}deg) scale(${breathe})`;
    el.style.fontSize = size + 'px';
    if (el._wt !== weight) { el.style.fontWeight = weight; el._wt = weight; }
    el.style.opacity = alphaState * fade * (l === 'ops' ? .62 : 1);

    /* 鋳造演出: 生引用→blur→核語 */
    if (w.qEl) {
      const bq = smooth(1 - Math.abs(t - w.bornT) / .4);
      w.qEl.style.opacity = bq * .85;
      w.qEl.style.filter = `blur(${(1 - bq) * 4}px)`;
    }
    /* 朱下線 draw-in（pの純関数=逆走で巻き戻る） */
    if (w.uEl) w.uEl.style.transform = `scaleX(${clamp((t - w.bornT) * 2.2, 0, 1)})`;
  }

  /* スクラバー */
  bar.style.width = (p * 100) + '%';
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
