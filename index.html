/* ===================================================================
   C16 — KEYBOARD SHORTCUTS
   =================================================================== */
const THEME_KEYS = ['nature', 'system', 'education', 'music', 'philosophy'];

document.addEventListener('keydown', (e) => {
  /* guard: ignore if typing in inputs */
  if (e.target.tagName !== 'BODY') return;

  const key = e.key;

  /* ESC: close detail if open, else dismiss preview, else clear filter */
  if (key === 'Escape') {
    if (detailOpen) {
      closeDetail();
    } else if (previewOpenForChipId !== null) {
      /* dismiss the preview panel */
      onLeave();
      setTimeout(() => { driftPaused = false; }, 1200);
    } else {
      activeFilters.clear();
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      applyFilter();
      updateCoord();
    }
    return;
  }

  /* 1–7: toggle theme filter (P5 multi-select via keyboard) */
  if (key >= '1' && key <= '7') {
    const idx = parseInt(key) - 1;
    const themeKey = THEME_KEYS[idx];
    if (!themeKey) return;
    const sb = document.getElementById('theme-sidebar');
    if (activeFilters.has(themeKey)) {
      activeFilters.delete(themeKey);
      sb.querySelectorAll('.sidebar-item').forEach(i => {
        if (i.dataset.key === themeKey) i.classList.remove('active');
      });
    } else {
      activeFilters.add(themeKey);
      sb.querySelectorAll('.sidebar-item').forEach(i => {
        if (i.dataset.key === themeKey) i.classList.add('active');
      });
    }
    applyFilter();
    updateCoord();
    return;
  }

  /* 0: clear all filters */
  if (key === '0') {
    activeFilters.clear();
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    applyFilter();
    updateCoord();
    return;
  }

  /* S: shuffle */
  if (key === 's' || key === 'S') {
    shuffleSeed = Math.floor(Math.random() * 999999) + 1000;
    if (timelineMode === 'chronological') {
      timelineMode = 'curated';
      document.getElementById('tl-curated').classList.add('active');
      document.getElementById('tl-chrono').classList.remove('active');
    }
    render();
    return;
  }

  /* T: toggle timeline */
  if (key === 't' || key === 'T') {
    if (timelineMode === 'curated') {
      timelineMode = 'chronological';
      document.getElementById('tl-chrono').classList.add('active');
      document.getElementById('tl-curated').classList.remove('active');
    } else {
      timelineMode = 'curated';
      document.getElementById('tl-curated').classList.add('active');
      document.getElementById('tl-chrono').classList.remove('active');
    }
    render();
    return;
  }
});

/* ===================================================================
   C15 — URL hash deep link on page load
   =================================================================== */
function checkHashOnLoad() {
  const hash = window.location.hash;
  /* color filter takes priority */
  const cm = hash.match(/^#color=([0-9A-Fa-f]{6})$/i);
  if (cm) { applyColorFilter(cm[1].toUpperCase()); return; }
  const m = hash.match(/^#\/work\/(\d+)$/);
  if (!m) return;
  const idx = parseInt(m[1]) - 1;
  if (idx < 0 || idx >= allPlaced.length) return;
  const { chip, el } = allPlaced[idx];
  openDetail(chip, el, idx);
}

/* ===================================================================
   COLOR FILTER — #color=HEX hash
   =================================================================== */

/* Euclidean RGB distance */
function colorDistance(hexA, hexB) {
  const [r1,g1,b1] = hexToRgb(hexA);
  const [r2,g2,b2] = hexToRgb(hexB);
  return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
}

const COLOR_FILTER_THRESHOLD = 30;

function applyColorFilter(targetHex) {
  if (!allPlaced.length) return;

  /* normalise to uppercase with #  */
  const hex6 = targetHex.replace('#','').toUpperCase();
  const fullHex = '#' + hex6;

  /* find matching chips by color distance on their displayed color */
  const matches = [];
  const nonMatches = [];
  allPlaced.forEach(({ chip, el }, i) => {
    const displayColor = getChipDisplayColor(chip.theme);
    const dist = colorDistance(displayColor, fullHex);
    if (dist <= COLOR_FILTER_THRESHOLD) {
      matches.push({ chip, el, i });
    } else {
      nonMatches.push({ chip, el, i });
    }
  });

  colorFilterActive = true;

  /* dim non-matches */
  nonMatches.forEach(({ el, i }) => {
    el.style.opacity = '0.18';
    /* also dim clone (i = original allPlaced index) */
    const cloneEl = scatterClone ? scatterClone.children[i] : null;
    if (cloneEl) cloneEl.style.opacity = '0.18';
  });

  /* keep matches at full opacity */
  matches.forEach(({ el, i }) => {
    el.style.opacity = '1';
    const cloneEl = scatterClone ? scatterClone.children[i] : null;
    if (cloneEl) cloneEl.style.opacity = '1';
  });

  /* show notice */
  const noticeEl = document.getElementById('color-filter-notice');
  const swatchEl = document.getElementById('color-filter-swatch');
  const labelEl  = document.getElementById('color-filter-label');
  swatchEl.style.background = fullHex;
  const countLabel = matches.length === 0
    ? `#${hex6} (0 works) — 該当なし`
    : `#${hex6} (${matches.length} work${matches.length > 1 ? 's' : ''})`;
  labelEl.textContent = countLabel;
  noticeEl.classList.add('visible');

  /* auto-scroll and pulse if matches found */
  if (matches.length > 0) {
    /* pause drift during scroll */
    driftPaused = true;

    /* find leftmost matching chip x position and its width */
    let leftmostX = Infinity;
    let leftmostW = 120;
    matches.forEach(({ el }) => {
      const chipX = parseFloat(el.style.left) || 0;
      if (chipX < leftmostX) {
        leftmostX = chipX;
        leftmostW = parseFloat(el.style.width) || 120;
      }
    });

    /* B: smooth scroll to center the leftmost matching chip in viewport.
       Formula: targetScrollX = chipX - (viewportWidth/2) + (chipSize/2) */
    const vw = window.innerWidth;
    const targetScroll = leftmostX - vw / 2 + leftmostW / 2;
    const clampedTarget = Math.max(0, targetScroll);

    const scrollStart = hScrollX;
    const scrollDelta = clampedTarget - scrollStart;
    const scrollDuration = 1200;
    const scrollStartTime = performance.now();

    /* easing: cubic-bezier(0.22, 1, 0.36, 1) approximated via JS */
    function easeOutExpo(t) {
      /* approximate cubic-bezier(0.22, 1, 0.36, 1) */
      return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    }

    function scrollStep(now) {
      const elapsed = now - scrollStartTime;
      const t = Math.min(elapsed / scrollDuration, 1);
      const eased = easeOutExpo(t);
      hScrollX = scrollStart + scrollDelta * eased;
      applyHScroll();
      if (t < 1) {
        requestAnimationFrame(scrollStep);
      } else {
        /* scroll complete — trigger pulse animations */
        matches.forEach(({ el }, idx) => {
          const delay = idx * 150;
          setTimeout(() => {
            el.classList.remove('chip-color-pulse');
            void el.offsetWidth; /* reflow to restart */
            el.classList.add('chip-color-pulse');
            el.addEventListener('animationend', () => {
              el.classList.remove('chip-color-pulse');
            }, { once: true });
          }, delay);
        });
        /* resume drift after pulse completes */
        const totalPulseDuration = (matches.length - 1) * 150 + 1200 + 400;
        setTimeout(() => { driftPaused = false; }, totalPulseDuration);
      }
    }

    requestAnimationFrame(scrollStep);
  }
}

function clearColorFilter() {
  colorFilterActive = false;
  /* restore all chip opacities based on sidebar filter state */
  applyFilter();
  /* hide notice */
  document.getElementById('color-filter-notice').classList.remove('visible');
  /* clear hash */
  history.replaceState(null, '', window.location.pathname + window.location.search);
  /* resume drift */
  driftPaused = false;
}

document.getElementById('color-filter-clear').addEventListener('click', clearColorFilter);

/* ===================================================================
   FIX B — PROXIMITY DIMMING
   Dims chips whose left edge is within 24px of sidebar's right edge,
   composing with filter dim (uses the lower opacity if both apply).
   =================================================================== */
const PROXIMITY_THRESHOLD = 24; /* px */
let _rafProximity = null;

function applyProximityDim() {
  if (colorFilterActive) return; /* color filter owns opacity while active */
  const sidebar = document.getElementById('theme-sidebar');
  if (!sidebar || window.innerWidth < 900) return;
  const sbRect = sidebar.getBoundingClientRect();
  const sbRight = sbRect.right;

  allPlaced.forEach(({ chip, el }) => {
    const cr = el.getBoundingClientRect();
    const isNear = cr.left < sbRight + PROXIMITY_THRESHOLD;

    /* compute filter opacity (from activeFilters state) */
    const filterOpacity = (activeFilters.size > 0 && !chipMatchesFilter(chip)) ? 0.12 : 1;

    if (isNear) {
      /* compose: use the lower of the two dim sources */
      const composed = Math.min(filterOpacity, 0.35);
      el.dataset.proximityDimmed = '1';
      el.style.opacity = String(composed);
    } else {
      el.dataset.proximityDimmed = '';
      /* restore filter opacity only if not hovered */
      if (!hoverEl) {
        el.style.opacity = String(filterOpacity);
      }
    }
  });
}

function scheduleProximityDim() {
  if (_rafProximity) return;
  _rafProximity = requestAnimationFrame(() => {
    _rafProximity = null;
    applyProximityDim();
  });
}

/* Proximity dim fires on resize (no vertical scroll in horizontal mode) */
window.addEventListener('resize', scheduleProximityDim, { passive: true });

/* Decision 3 γ: wheel-scrolling suppression — add is-scrolling while wheel is active */
(function () {
  let scrollEndT = null;
  document.querySelector('.page').addEventListener('wheel', () => {
    document.body.classList.add('is-scrolling');
    clearTimeout(scrollEndT);
    scrollEndT = setTimeout(() => {
      document.body.classList.remove('is-scrolling');
    }, 60);
  }, { passive: true });
})();

/* ===================================================================
   CHIP COMMENT TRAILS  (Task D)
   Fetch comments for every chip in parallel, build color map, then
   inject .chip-comment-trail elements into already-rendered chips.
   =================================================================== */

/* Global map: workId → array of hex color strings (most-recent first, max 7) */
let commentsByWork = {};

async function loadAllChipComments() {
  if (!DATA.length) return;
  try {
    const results = await Promise.all(DATA.map(async work => {
      if (!work.id) return { id: work.id, comments: [] };
      try {
        const r = await fetch(`/api/comments?workId=${encodeURIComponent(work.id)}`);
        return r.ok ? { id: work.id, comments: await r.json() } : { id: work.id, comments: [] };
      } catch { return { id: work.id, comments: [] }; }
    }));
    results.forEach(({ id, comments }) => {
      if (!id) return;
      /* most-recent first: API returns newest-last, so reverse */
      const colors = [...comments].reverse()
        .map(c => c.color).filter(Boolean).slice(0, 7);
      commentsByWork[id] = colors;
    });
  } catch (e) {
    /* non-fatal — trails just show empty */
    console.warn('[L3 trails]', e);
  }
}

/* Inject trail dots into all currently-rendered primary chips */
function injectChipTrails() {
  allPlaced.forEach(({ chip, el }) => {
    /* remove any existing trail (idempotent) */
    const existing = el.querySelector('.chip-comment-trail');
    if (existing) existing.remove();

    const colors = commentsByWork[chip.id] || [];
    if (!colors.length) return;

    const trail = document.createElement('div');
    trail.className = 'chip-comment-trail';
    colors.forEach(color => {
      const dot = document.createElement('span');
      dot.className = 'chip-trail-dot';
      dot.style.background = color;
      trail.appendChild(dot);
    });
    el.appendChild(trail);
  });
}

/* Update trail for a single chip after a successful comment submit */
function updateChipTrail(workId, newColor) {
  if (!workId) return;
  const existing = commentsByWork[workId] || [];
  /* prepend new color (most-recent first), cap at 7 */
  commentsByWork[workId] = [newColor, ...existing].slice(0, 7);
  /* re-inject only the chip(s) matching this workId */
  allPlaced.forEach(({ chip, el }) => {
    if (chip.id !== workId) return;
    const old = el.querySelector('.chip-comment-trail');
    if (old) old.remove();
    const colors = commentsByWork[workId];
    if (!colors.length) return;
    const trail = document.createElement('div');
    trail.className = 'chip-comment-trail';
    colors.forEach(color => {
      const dot = document.createElement('span');
      dot.className = 'chip-trail-dot';
      dot.style.background = color;
      trail.appendChild(dot);
    });
    el.appendChild(trail);
  });
}

/* ===================================================================
   INIT + RESIZE
   loadContent() fetches /api/content and populates DATA before the
   first render. All other init (sidebar, hash, drift) follows after.
   =================================================================== */
(async () => {
  buildLegend();
  buildSidebar();
  await loadContent();
  render();
  checkHashOnLoad();
  /* run proximity dim once after initial render */
  applyProximityDim();
  /* start drift loop */
  driftLoop();
  /* load comment trails in background — non-blocking */
  loadAllChipComments().then(injectChipTrails);
})();

let _prevW = window.innerWidth;
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  /* Re-render when crossing layout breakpoints (900px or 480px mobile-size boundary) */
  const needsRender =
    (w < 900) !== (_prevW < 900) ||
    (w <= 480) !== (_prevW <= 480);
  _prevW = w;
  if (needsRender) { render(); }
  /* Close drawer if viewport expands above 768px */
  if (w > 768) closeDrawer();
});

/* ===================================================================
   M1 — HAMBURGER DRAWER
   =================================================================== */
const hamburgerBtn  = document.getElementById('hamburger-btn');
const drawerBackdrop = document.getElementById('drawer-backdrop');
const themeSidebar  = document.getElementById('theme-sidebar');

function openDrawer() {
  themeSidebar.classList.add('drawer-open');
  drawerBackdrop.classList.add('visible');
  /* Next frame triggers opacity transition */
  requestAnimationFrame(() => drawerBackdrop.classList.add('open'));
  hamburgerBtn.setAttribute('aria-expanded', 'true');
  hamburgerBtn.textContent = '✕';
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  themeSidebar.classList.remove('drawer-open');
  drawerBackdrop.classList.remove('open');
  hamburgerBtn.setAttribute('aria-expanded', 'false');
  hamburgerBtn.textContent = '☰';
  document.body.style.overflow = '';
  /* Remove display after transition */
  setTimeout(() => {
    if (!themeSidebar.classList.contains('drawer-open')) {
      drawerBackdrop.classList.remove('visible');
    }
  }, 300);
}

function isDrawerOpen() {
  return themeSidebar.classList.contains('drawer-open');
}

hamburgerBtn.addEventListener('click', () => {
  if (isDrawerOpen()) closeDrawer(); else openDrawer();
});

drawerBackdrop.addEventListener('click', closeDrawer);

/* Task 6: preview backdrop tap closes preview */
document.getElementById('preview-backdrop').addEventListener('click', () => {
  if (previewOpenForChipId !== null) {
    onLeave();
    setTimeout(() => { driftPaused = false; }, 1200);
  }
});

/* Close drawer on ESC */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isDrawerOpen()) {
    closeDrawer();
  }
});

/* ===================================================================
   DETAIL COMMENTS
   =================================================================== */

/* Track the currently picked color (#RRGGBB or null) */
let _pickedColor = null;

/* ── initColorPicker ── */
/* Called each time a detail opens; re-draws on the freshly created canvas. */
function initColorPicker() {
  const canvas = document.getElementById('detail-color-picker');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  /* 1. horizontal hue gradient */
  const hueGrad = ctx.createLinearGradient(0, 0, W, 0);
  hueGrad.addColorStop(0,    '#ff0000');
  hueGrad.addColorStop(0.17, '#ff8800');
  hueGrad.addColorStop(0.33, '#ffee00');
  hueGrad.addColorStop(0.5,  '#00cc00');
  hueGrad.addColorStop(0.67, '#00cccc');
  hueGrad.addColorStop(0.83, '#0088ff');
  hueGrad.addColorStop(1,    '#aa00ff');
  ctx.fillStyle = hueGrad;
  ctx.fillRect(0, 0, W, H);

  /* 2. top-to-bottom darkness gradient (black at top) */
  const darkGrad = ctx.createLinearGradient(0, 0, 0, H);
  darkGrad.addColorStop(0, 'rgba(0,0,0,1)');
  darkGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = darkGrad;
  ctx.fillRect(0, 0, W, H);

  /* Reset picked color; reset dot/hex display */
  _pickedColor = null;
  const dotEl = document.getElementById('detail-color-dot');
  const hexEl = document.getElementById('detail-color-hex');
  if (dotEl) dotEl.style.background = '#ccc';
  if (hexEl) hexEl.textContent = '#—';

  /* Update submit button state */
  updateSubmitBtn();

  /* Bind pick events */
  function pickAt(evt) {
    evt.preventDefault();
    const rect = canvas.getBoundingClientRect();
    let cx, cy;
    if (evt.touches) {
      cx = evt.touches[0].clientX - rect.left;
      cy = evt.touches[0].clientY - rect.top;
    } else {
      cx = evt.clientX - rect.left;
      cy = evt.clientY - rect.top;
    }
    /* Clamp */
    const px = Math.max(0, Math.min(W - 1, Math.round(cx * (W / rect.width))));
    const py = Math.max(0, Math.min(H - 1, Math.round(cy * (H / rect.height))));

    /* Read pixel */
    const [r, g, b] = ctx.getImageData(px, py, 1, 1).data;
    const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();
    _pickedColor = hex;

    /* Update preview */
    if (dotEl) dotEl.style.background = hex;
    if (hexEl) hexEl.textContent = hex;

    /* Draw ring indicator */
    ctx.clearRect(0, 0, W, H);
    /* Re-draw base */
    ctx.fillStyle = hueGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = darkGrad;
    ctx.fillRect(0, 0, W, H);
    /* Ring */
    ctx.beginPath();
    ctx.arc(px, py, 6, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px, py, 6, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    updateSubmitBtn();
  }

  canvas.addEventListener('click', pickAt);
  canvas.addEventListener('touchstart', pickAt, { passive: false });
}

function updateSubmitBtn() {
  const btn = document.getElementById('detail-comment-submit');
  const txt = document.getElementById('detail-comment-text');
  if (!btn || !txt) return;
  const hasColor = !!_pickedColor;
  const hasText  = txt.value.trim().length >= 2;
  btn.disabled = !(hasColor && hasText);
}

/* Bind text input live validation (once; re-binding after each openDetail is fine
   because the element is recreated each time via innerHTML) */
document.addEventListener('input', (e) => {
  if (e.target && e.target.id === 'detail-comment-text') {
    updateSubmitBtn();
  }
});

/* ── loadComments ── */
async function loadComments(workId) {
  if (!workId) return;
  const listEl   = document.getElementById('detail-comments-list');
  if (!listEl) return;

  listEl.innerHTML = '<span class="detail-comments-empty">読み込み中…</span>';

  try {
    const res = await fetch(`/api/comments?workId=${encodeURIComponent(workId)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const comments = await res.json();
    renderComments(comments, workId);
  } catch (err) {
    if (listEl) listEl.innerHTML = `<span class="detail-comments-empty">読み込みエラー</span>`;
    console.warn('[L3 comments] load error:', err);
  }
}

/* ── renderComments ── */
/* Offset pattern (%) cycling for scattered horizontal placement */
const MURMUR_OFFSETS = [2, 22, 8, 30, 0, 14, 26, 6, 18];

function renderComments(comments, workId) {
  const listEl  = document.getElementById('detail-comments-list');
  if (!listEl) return;

  if (!comments.length) {
    listEl.innerHTML = '<span class="detail-comments-empty" style="font-size:18px;color:rgba(26,26,26,0.18);">·</span>';
  } else {
    listEl.innerHTML = '';
    comments.forEach((c, i) => {
      const item = buildCommentItem(c, i);
      listEl.appendChild(item);
    });
  }

  /* Bind submit button for this workId (always — even for empty list) */
  const submitBtn = document.getElementById('detail-comment-submit');
  if (submitBtn) {
    /* Remove previous listeners by cloning */
    const fresh = submitBtn.cloneNode(true);
    submitBtn.replaceWith(fresh);
    fresh.addEventListener('click', () => submitComment(workId));
  }
}

/* ── buildCommentItem ── */
function buildCommentItem(c, i) {
  const item = document.createElement('div');
  item.className = 'comment-item';

  /* Scattered horizontal offset — cycle through fixed pattern */
  const offsetPct = MURMUR_OFFSETS[i % MURMUR_OFFSETS.length];
  item.style.marginLeft = `${offsetPct}%`;

  /* Fade-in stagger */
  item.style.animation = `murmur-appear 600ms cubic-bezier(0.22,1,0.36,1) both`;
  item.style.animationDelay = `${i * 80}ms`;

  const dot = document.createElement('span');
  dot.className = 'comment-dot';
  dot.style.background = c.color || '#ccc';

  const txt = document.createElement('span');
  txt.className = 'comment-text';
  txt.textContent = c.text || '';

  item.appendChild(dot);
  item.appendChild(txt);

  /* Expand / collapse on click */
  item.addEventListener('click', () => {
    const isExpanded = item.classList.contains('expanded');
    /* Collapse all others */
    const list = document.getElementById('detail-comments-list');
    if (list) list.querySelectorAll('.comment-item.expanded').forEach(el => el.classList.remove('expanded'));
    if (!isExpanded) item.classList.add('expanded');
  });

  return item;
}

/* ── submitComment ── */
async function submitComment(workId) {
  if (!_pickedColor) return;
  const textEl   = document.getElementById('detail-comment-text');
  const statusEl = document.getElementById('detail-comment-status');
  const submitBtn = document.getElementById('detail-comment-submit');
  if (!textEl || !statusEl || !submitBtn) return;

  const text = textEl.value.trim();
  if (text.length < 2 || text.length > 140) {
    if (statusEl) statusEl.textContent = '2〜140文字で入力してください';
    return;
  }

  /* capture color before clearing */
  const submittedColor = _pickedColor;

  submitBtn.disabled = true;
  if (statusEl) statusEl.textContent = '投稿中…';

  try {
    const res = await fetch('/api/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workId, color: submittedColor, text }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || `HTTP ${res.status}`);

    /* Clear input */
    textEl.value = '';
    _pickedColor = null;
    const dotEl = document.getElementById('detail-color-dot');
    const hexEl = document.getElementById('detail-color-hex');
    if (dotEl) dotEl.style.background = '#ccc';
    if (hexEl) hexEl.textContent = '#—';
    /* Re-init picker to reset ring */
    initColorPicker();

    if (statusEl) statusEl.textContent = 'コメントを投稿しました';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);

    /* Update chip trail for this work immediately from local state */
    updateChipTrail(workId, submittedColor);

    /* Reload comments */
    await loadComments(workId);
  } catch (err) {
    const msg = err.message || '投稿に失敗しました';
    if (statusEl) statusEl.textContent = msg;
    submitBtn.disabled = false;
    updateSubmitBtn();
  }
}
